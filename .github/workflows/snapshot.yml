name: Daily Test Case Snapshot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run snapshot script
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          SNAPSHOT_SECRET: ${{ secrets.SNAPSHOT_SECRET }}
        run: node scripts/snapshot.mjs

      - name: Keep workflow alive
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          days=$(( (now - last) / 86400 ))
          if [ "$days" -ge 45 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive [skip ci]"
            git push
          else
            echo "Last commit $days days ago — no keepalive needed"
          fi
