name: Daily Test Case Snapshot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run snapshot script
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
        run: node scripts/snapshot.mjs

      - name: Create PR with snapshot data
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: daily test case snapshot"
          branch: automated/daily-snapshot
          title: "chore: daily test case snapshot"
          body: Automated daily snapshot of test case counts from Qase.
          add-paths: public/data/snapshots/
          delete-branch: true

      - name: Enable auto-merge on PR
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --auto
        env:
          GH_TOKEN: ${{ github.token }}
