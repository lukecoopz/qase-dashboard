<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Qase Dashboard</title>
  <script>
    // GitHub Pages SPA redirect — encodes the path into a query param and
    // redirects to the root index.html which then restores the URL.
    // pathSegmentsToKeep = 1 preserves /qase-dashboard/ as the base.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
